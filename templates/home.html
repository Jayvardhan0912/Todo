<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO LIST</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />

    <style>
      body {
        background: #f5f6fa;
      }

      .task-container {
        height: 400px;
        overflow-y: auto;
        background: white;
        padding: 10px;
        border-radius: 10px;
      }

      .form-control {
        padding: 1.2rem;
      }

      .task-card {
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container mt-4">
      <h3 class="text-center mb-4">Django ToDo App</h3>

      <div class="row">
        <!-- Left Side -->
        <div class="col-md-7">
          <h4>My Day</h4>
          <p class="text-muted" id="date"></p>

          <div class="task-container">
            <!-- Task -->
            <div class="card task-card">
              <div class="card-body">
                This is some Task
                <span style="float: right">
                  <button class="btn btn-success btn-sm">
                    <i class="fa fa-check"></i> Done
                  </button>
                  <button class="btn btn-danger btn-sm">
                    <i class="fa fa-trash"></i>
                  </button>
                  <button class="btn btn-primary btn-sm">
                    <i class="fa fa-pencil"></i>
                  </button>
                </span>
              </div>
            </div>

            <div class="card task-card">
              <div class="card-body">
                Another Task Example
                <span style="float: right">
                  <button class="btn btn-success btn-sm">
                    <i class="fa fa-check"></i> Done
                  </button>
                  <button class="btn btn-danger btn-sm">
                    <i class="fa fa-trash"></i>
                  </button>
                  <button class="btn btn-primary btn-sm">
                    <i class="fa fa-pencil"></i>
                  </button>
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Side -->
        <div class="col-md-5">
          <h5>Completed Tasks</h5>

          <div class="task-container">
            <div class="card task-card">
              <div class="card-body">
                This is the completed task
                <span style="float: right">
                  <button class="btn btn-danger btn-sm">
                    <i class="fa fa-times"></i> Undo
                  </button>
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Form (fixed bottom spacing instead of absolute) -->
      <div class="row mt-4">
        <div class="col-md-8">
          <input type="text" class="form-control" placeholder="Add a task" />
        </div>
        <div class="col-md-4">
          <button class="btn btn-primary w-100">
            <i class="fa fa-plus"></i> Add
          </button>
        </div>
      </div>
    </div>

    <script>
      // Dynamic date
      document.getElementById("date").innerText = new Date().toDateString();
    </script>
  </body>
</html>
